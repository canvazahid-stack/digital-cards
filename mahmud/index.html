<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Md. Mahmudul Hasan - Digital vCard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #10b981; 
            --facebook: #1877f2; --text-main: #1e293b; --text-muted: #64748b;
            --white: #ffffff; --bg-page: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: var(--bg-page); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 5px 10px; }
        .vcard-wrapper { max-width: 350px; width: 100%; background: var(--white); border-radius: 20px; box-shadow: 15px 15px 30px rgba(15, 23, 42, 0.08); overflow: hidden; position: relative; margin-bottom: 10px; background-color: #ffffff; }
        .vcard-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); height: 90px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .profile-pic-container { text-align: center; margin-top: -50px; position: relative; z-index: 10; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--white); box-shadow: 0 8px 20px rgba(15, 23, 42, 0.1); background: #e2e8f0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 2.2rem; margin: 0 auto; overflow: hidden; }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .verified-badge { position: absolute; bottom: 2px; right: calc(50% - 45px); background: var(--accent); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--white); z-index: 15; }
        .vcard-identity { text-align: center; padding: 10px 15px 5px; }
        .vcard-name { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .vcard-title { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-top: 2px; text-transform: uppercase; }
        .vcard-company { font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-top: 4px; }
        .contact-details-list { padding: 5px 20px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
        .contact-row { display: flex; align-items: center; background: #f8fafc; padding: 8px 12px; border-radius: 12px; border: 1px solid #f1f5f9; }
        .contact-icon-box { width: 30px; height: 30px; border-radius: 8px; background: var(--white); color: var(--accent); display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 0.8rem; }
        .contact-label { font-size: 0.55rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;}
        .contact-value { font-size: 0.85rem; font-weight: 700; color: var(--text-main); margin-top: -2px;}
        .action-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px; margin-bottom: 12px; }
        .action-btn { text-align: center; text-decoration: none; padding: 10px 5px; border-radius: 10px; color: var(--white); font-weight: 700; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-call { background: var(--primary); } .btn-wa { background: var(--success); } .btn-mail { background: #334155; } .btn-fb { background: var(--facebook); }
        .save-contact-area { padding: 0 20px 15px; }
        .btn-save { width: 100%; background: var(--accent); color: var(--white); border: none; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .vcard-footer { text-align: center; padding: 12px 15px; background: #f8fafc; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid #f1f5f9; }
        .footer-company { font-weight: 700; color: var(--primary); display: block; margin-bottom: 3px;}
        .tools-container { width: 100%; max-width: 350px; }
        .btn-download { width: 100%; background: var(--primary); color: var(--white); border: none; padding: 12px; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #toast { visibility: hidden; min-width: 180px; background-color: #0f172a; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 20px; transform: translateX(-50%); font-size: 0.8rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div class="vcard-wrapper" id="vcardElement">
        <div class="vcard-header"></div>
        <div class="profile-pic-container">
            <div class="profile-pic">
                <div style="position:absolute; z-index:1; font-weight:800; font-size:2rem; color:#2563eb;">MH</div>
                <img src="profile.png" alt="Profile" onerror="this.style.display='none'">
            </div>
            <div class="verified-badge"><i class="fas fa-check"></i></div>
        </div>
        <div class="vcard-identity">
            <h1 class="vcard-name">Md. Mahmudul Hasan</h1>
            <p class="vcard-title">General Manager</p>
            <p class="vcard-company">Hyder Motors</p>
        </div>
        <div class="contact-details-list">
            <div class="contact-row"><div class="contact-icon-box"><i class="fas fa-mobile-alt"></i></div><div class="contact-text-box"><div class="contact-label">Mobile</div><div class="contact-value">+880 1711-027818</div></div></div>
            <div class="contact-row"><div class="contact-icon-box"><i class="fas fa-building"></i></div><div class="contact-text-box"><div class="contact-label">Office</div><div class="contact-value">+880 1713-414902</div></div></div>
            <div class="contact-row"><div class="contact-icon-box"><i class="fas fa-envelope"></i></div><div class="contact-text-box"><div class="contact-label">Email</div><div class="contact-value">hmacl.mahmud@gmail.com</div></div></div>
        </div>
        <div class="action-buttons">
            <a href="tel:+8801711027818" class="action-btn btn-call"><i class="fas fa-phone-alt"></i> Call</a>
            <a href="https://wa.me/8801711027818" class="action-btn btn-wa" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="mailto:hmacl.mahmud@gmail.com" class="action-btn btn-mail"><i class="fas fa-envelope"></i> Email</a>
            <a href="https://www.facebook.com/share/18NMGGGuHP/" class="action-btn btn-fb" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
        </div>
        <div class="save-contact-area"><a href="tel:+8801711027818" class="btn-save"><i class="fas fa-user-plus"></i> Save Contact</a></div>
        <div class="vcard-footer">
            <span class="footer-company">Alliance Consortium Ltd.</span>
            <i class="fas fa-map-marker-alt"></i> 76-77, Nawabpur Tower, Dhaka
        </div>
    </div>
    <div class="tools-container"><button class="btn-download" onclick="downloadPNG()"><i class="fas fa-id-card"></i> Card Image</button></div>
    <div id="toast">Copied!</div>
    <script>
        function downloadPNG() {
            const card = document.getElementById('vcardElement');
            const originalShadow = card.style.boxShadow; card.style.boxShadow = 'none';
            html2canvas(card, { scale: 3, useCORS: true, backgroundColor: '#ffffff', borderRadius: 20 }).then(canvas => {
                const link = document.createElement('a'); link.download = 'Mahmudul_Hasan_vCard.png';
                link.href = canvas.toDataURL('image/png'); link.click(); card.style.boxShadow = originalShadow;
            });
        }
    </script>
</body>
</html>
