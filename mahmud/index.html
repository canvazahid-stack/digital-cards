<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Md. Mahmudul Hasan - Digital vCard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #10b981; 
            --facebook: #1877f2; --text-main: #1e293b; --text-muted: #64748b;
            --white: #ffffff; --bg-page: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', 'Hind Siliguri', sans-serif; background-color: var(--bg-page); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 15px 10px; }

        /* কার্ডের সাইজ বাড়ানো হয়েছে (Max-width: 400px) */
        .vcard-wrapper { 
            max-width: 400px; 
            width: 100%; 
            background: var(--white); 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.1); 
            overflow: hidden; 
            position: relative; 
            margin-bottom: 15px; 
            background-color: #ffffff; 
        }

        .vcard-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); height: 110px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); }
        .profile-pic-container { text-align: center; margin-top: -60px; position: relative; z-index: 10; }
        
        /* প্রোফাইল পিকচার বড় করা হয়েছে */
        .profile-pic { 
            width: 125px; 
            height: 125px; 
            border-radius: 50%; 
            border: 5px solid var(--white); 
            box-shadow: 0 8px 25px rgba(15, 23, 42, 0.15); 
            background: #e2e8f0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto; 
            overflow: hidden; 
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .verified-badge { position: absolute; bottom: 5px; right: calc(50% - 55px); background: var(--accent); color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid var(--white); z-index: 15; }

        .vcard-identity { text-align: center; padding: 15px 20px 10px; }
        .vcard-name { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .vcard-title { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .vcard-company { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-top: 5px; }

        .contact-details-list { padding: 10px 25px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .contact-row { 
            display: flex; align-items: center; background: #f8fafc; padding: 12px 16px; 
            border-radius: 16px; border: 1px solid #f1f5f9; cursor: pointer;
            transition: all 0.3s ease;
        }
        .contact-row:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            background: var(--white);
            border-color: #cbd5e1;
        }

        .contact-icon-box { width: 36px; height: 36px; border-radius: 10px; background: var(--white); color: var(--accent); display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .contact-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;}
        .contact-value { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-top: -1px;}

        .action-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 25px; margin-bottom: 15px; }
        
        .action-btn { 
            text-align: center; text-decoration: none; padding: 12px 5px; border-radius: 14px; 
            color: var(--white); font-weight: 700; font-size: 0.75rem; display: flex; 
            flex-direction: column; align-items: center; gap: 6px;
            transition: all 0.3s ease;
        }
        .action-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); }
        .action-btn i { font-size: 1.3rem; }

        .btn-call { background: var(--primary); } 
        .btn-wa { background: var(--success); } 
        .btn-mail { background: #334155; } 
        .btn-fb { background: var(--facebook); }

        .save-contact-area { padding: 0 25px 20px; }
        .btn-save { 
            width: 100%; background: var(--accent); color: var(--white); border: none; 
            padding: 15px; border-radius: 16px; font-weight: 700; font-size: 1.1rem; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 10px; text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.15);
        }
        .btn-save:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }

        .vcard-footer { text-align: center; padding: 15px 20px; background: #f8fafc; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid #f1f5f9; }
        .footer-company { font-weight: 700; color: var(--primary); display: block; margin-bottom: 4px; font-size: 0.95rem;}

        .tools-container { width: 100%; max-width: 400px; }
        .btn-download { 
            width: 100%; background: var(--primary); color: var(--white); border: none; 
            padding: 15px; border-radius: 16px; font-size: 1rem; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 10px; transition: all 0.3s ease;
        }
        .btn-download:hover { background: #000000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        #toast { visibility: hidden; min-width: 200px; background-color: #0f172a; color: #fff; text-align: center; border-radius: 12px; padding: 14px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 0.9rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>
    <div class="vcard-wrapper" id="vcardElement">
        <div class="vcard-header"></div>
        <div class="profile-pic-container">
            <div class="profile-pic">
                <img src="profile.jpeg" alt="Profile" onerror="this.style.display='none'">
            </div>
            <div class="verified-badge"><i class="fas fa-check"></i></div>
        </div>
        <div class="vcard-identity">
            <h1 class="vcard-name">Md. Mahmudul Hasan</h1>
            <p class="vcard-title">General Manager</p>
            <p class="vcard-company">Hyder Motors</p>
        </div>
        <div class="contact-details-list">
            <div class="contact-row" onclick="copyToClipboard('+8801711027818', 'Mobile')"><div class="contact-icon-box"><i class="fas fa-mobile-alt"></i></div><div class="contact-text-box"><div class="contact-label">Mobile</div><div class="contact-value">+880 1711-027818</div></div></div>
            <div class="contact-row" onclick="copyToClipboard('+8801713414902', 'Office')"><div class="contact-icon-box"><i class="fas fa-building"></i></div><div class="contact-text-box"><div class="contact-label">Office</div><div class="contact-value">+880 1713-414902</div></div></div>
            <div class="contact-row" onclick="copyToClipboard('hmacl.mahmud@gmail.com', 'Email')"><div class="contact-icon-box"><i class="fas fa-envelope"></i></div><div class="contact-text-box"><div class="contact-label">Email</div><div class="contact-value">hmacl.mahmud@gmail.com</div></div></div>
        </div>
        <div class="action-buttons">
            <a href="tel:+8801711027818" class="action-btn btn-call"><i class="fas fa-phone-alt"></i> Call</a>
            <a href="https://wa.me/8801711027818" class="action-btn btn-wa" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            <a href="mailto:hmacl.mahmud@gmail.com" class="action-btn btn-mail"><i class="fas fa-envelope"></i> Email</a>
            <a href="https://www.facebook.com/share/18NMGGGuHP/" class="action-btn btn-fb" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
        </div>
        <div class="save-contact-area"><a href="tel:+8801711027818" class="btn-save"><i class="fas fa-user-plus"></i> Save Contact</a></div>
        <div class="vcard-footer">
            <span class="footer-company">Alliance Consortium Ltd.</span>
            <i class="fas fa-map-marker-alt"></i> 76-77, Nawabpur Tower, Dhaka
        </div>
    </div>
    <div class="tools-container"><button class="btn-download" onclick="downloadPNG()"><i class="fas fa-id-card"></i> Download Card Image</button></div>
    <div id="toast">Copied!</div>
    <script>
        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById("toast");
                toast.innerHTML = label + " Copied!"; toast.className = "show";
                setTimeout(() => { toast.className = ""; }, 2000);
            });
        }
        function downloadPNG() {
            const card = document.getElementById('vcardElement');
            const originalShadow = card.style.boxShadow; card.style.boxShadow = 'none';
            html2canvas(card, { scale: 3, useCORS: true, backgroundColor: '#ffffff', borderRadius: 28 }).then(canvas => {
                const link = document.createElement('a'); link.download = 'Mahmudul_Hasan_vCard.png';
                link.href = canvas.toDataURL(); link.click(); card.style.boxShadow = originalShadow;
            });
        }
    </script>
</body>
</html>
